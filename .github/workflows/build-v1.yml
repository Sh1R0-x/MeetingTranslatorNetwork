name: Build V1 Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build exe
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --name MeetingTranslatorNetwork --paths src --add-data "src\ui\style.qss;ui" --add-data "assets;assets" src\main.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeetingTranslatorNetwork-windows
          path: dist/MeetingTranslatorNetwork/**

  build-macos:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build app
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --name MeetingTranslatorNetwork --paths src --add-data "src/ui/style.qss:ui" --add-data "assets:assets" src/main.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeetingTranslatorNetwork-macos
          path: dist/MeetingTranslatorNetwork.app
